services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"
    depends_on:
      offload-task-cache:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://offload-task-cache:6379/0
      CELERY_RESULT_BACKEND: redis://offload-task-cache:6379/1

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    depends_on:
      offload-task-cache:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://offload-task-cache:6379/0
      CELERY_RESULT_BACKEND: redis://offload-task-cache:6379/1

  flower:
    build: .
    command: celery -A app.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      offload-task-cache:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://offload-task-cache:6379/0
      CELERY_RESULT_BACKEND: redis://offload-task-cache:6379/1

  offload-task-cache:
    image: redis:latest
    ports:
      - "6380:6379"
    volumes:
      - offload-task-cache:/data
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  offload-task-cache: