services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: celery -A worker.worker:celery_app worker --loglevel=info
    restart: always
    depends_on:
      offload-task-cache:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://offload-task-cache:6379/0
      CELERY_RESULT_BACKEND: redis://offload-task-cache:6379/1

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: celery -A worker.beat:celery_app beat --loglevel=info
    restart: always
    depends_on:
      offload-task-cache:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://offload-task-cache:6379/0
      CELERY_RESULT_BACKEND: redis://offload-task-cache:6379/1
    volumes:
      - celery-beat-data:/app/celerybeat

  # flower:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   working_dir: /app
  #   command: celery -A app.worker.celery_app flower --port=5555
  #   ports:
  #     - "5555:5555"
  #   depends_on:
  #     offload-task-cache:
  #       condition: service_healthy
  #   environment:
  #     CELERY_BROKER_URL: redis://offload-task-cache:6379/0
  #     CELERY_RESULT_BACKEND: redis://offload-task-cache:6379/1
  #   restart: always

  offload-task-cache:
    image: redis:latest
    ports:
      - "6380:6379"
    volumes:
      - offload-task-cache:/data
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  offload-task-cache:
  celery-beat-data:
